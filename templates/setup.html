<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Setup - AI Mock</title>
</head>
<body>

    <h1>AI Mock Interview Setup</h1>

    <form method="POST">

        <h3>Interview Category</h3>

        <input type="radio" name="category" value="HR" checked> HR<br>
        <input type="radio" name="category" value="Python"> Python<br>
        <input type="radio" name="category" value="Java"> Java<br>
        <input type="radio" name="category" value="DSA"> DSA<br>
        <input type="radio" name="category" value="DBMS"> DBMS<br>
        <input type="radio" name="category" value="AI/ML"> AI/ML<br><br>

        <h3>Difficulty</h3>

        <input type="radio" name="difficulty" value="Beginner" checked> Beginner<br>
        <input type="radio" name="difficulty" value="Intermediate"> Intermediate<br>
        <input type="radio" name="difficulty" value="Advanced"> Advanced<br><br>

        <h3>Number of Questions</h3>

        <input type="radio" name="num_questions" value="5"> 5<br>
        <input type="radio" name="num_questions" value="10" checked> 10<br>
        <input type="radio" name="num_questions" value="20"> 20<br><br>

        <button type="submit">Start Interview</button>

    </form>

</body>
</html>
