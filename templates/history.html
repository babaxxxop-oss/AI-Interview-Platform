<!DOCTYPE html>
<html>

<head>
    <title>Interview History</title>
</head>

<body>

<h1>📋 Interview History</h1>

{% if interviews %}

<table border="1" cellpadding="10">

<tr>
    <th>ID</th>
    <th>Category</th>
    <th>Difficulty</th>
    <th>Date</th>
    <th>Action</th>
</tr>

{% for interview in interviews %}

<tr>

<td>{{ interview[0] }}</td>
<td>{{ interview[1] }}</td>
<td>{{ interview[2] }}</td>
<td>{{ interview[3] }}</td>

<td>
    <a href="/history/{{ interview[0] }}">
        View Details
    </a>
</td>

</tr>

{% endfor %}

</table>

{% else %}

<p>No interviews found.</p>

{% endif %}

<br>

<a href="/dashboard">⬅ Back to Dashboard</a>

</body>

</html>
