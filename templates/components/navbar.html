<!-- ==========================================================
     AI Mock Navbar
========================================================== -->

<header class="sticky top-0 z-40 border-b border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-900 transition-all duration-300">

    <div class="flex items-center justify-between px-8 py-5">

        <!-- Left Side -->
        <div>

            <h1 id="logo-secret"
                class="text-3xl font-bold text-gray-900 dark:text-white cursor-pointer select-none">

                Welcome Back 👋

            </h1>

            <p class="mt-1 text-gray-500 dark:text-gray-400">

                Ready to crack your next interview?

            </p>

        </div>

        <!-- Right Side -->
        <div class="flex items-center gap-5">

            <!-- Notification -->
            <button
                class="flex h-11 w-11 items-center justify-center rounded-full bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-gray-300 border border-transparent dark:border-slate-700 transition-all duration-300 hover:scale-105 hover:bg-violet-100 dark:hover:bg-slate-700 hover:text-violet-600">

                <i class="fa-regular fa-bell text-lg"></i>

            </button>

            <!-- Dark Mode Toggle -->
            <button
                id="themeToggle"
                class="flex h-11 w-11 items-center justify-center rounded-full bg-gray-100 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 text-gray-700 dark:text-yellow-400 shadow-sm transition-all duration-300 hover:scale-110 hover:rotate-12 hover:bg-violet-100 dark:hover:bg-slate-700">

            </button>

            <!-- User -->
            <div class="flex items-center gap-3">

                <div
                    class="flex h-11 w-11 items-center justify-center rounded-full bg-violet-600 font-semibold text-white">

                    S

                </div>

                <div class="hidden md:block">

                    <h3 class="font-semibold text-gray-900 dark:text-white">

                        Shubham

                    </h3>

                    <p class="text-sm text-gray-500 dark:text-gray-400">

                        Student

                    </p>

                </div>

            </div>

            <!-- Logout -->
            <a href="{{ url_for('auth.logout') }}"
               class="inline-flex items-center gap-2 rounded-xl
                      border border-red-500
                      bg-red-50 dark:bg-red-900/20
                      px-5 py-3
                      font-semibold
                      text-red-600 dark:text-red-400
                      transition-all duration-300
                      hover:bg-red-600
                      hover:text-white
                      hover:border-red-600">

                <i class="fa-solid fa-right-from-bracket"></i>

                Logout

            </a>

        </div>

    </div>

</header>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const logo = document.getElementById("logo-secret");

    let clicks = 0;
    let timer = null;

    logo.addEventListener("click", function () {

        clicks++;

        clearTimeout(timer);

        if (clicks >= 5) {
            window.location.href = "{{ url_for('founder.secret_login') }}";
        }

        timer = setTimeout(function () {
            clicks = 0;
        }, 3000);

    });

});
</script>
