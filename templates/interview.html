<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Mock | Interview</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/interview.css') }}">

</head>

<body>

<div class="container">

    <!-- Header -->
    <div class="header">

        <h1>🎤 AI Mock Interview</h1>

        <a href="{{ url_for('main.dashboard') }}" class="back-btn">
            ← Dashboard
        </a>

    </div>

    <!-- Interview Box -->
    <form method="POST" class="interview-box">

        <!-- Interview Details -->
        <div class="info">

            <span>
                <strong>Category:</strong>
                {{ session.category }}
            </span>

            <span>
                <strong>Difficulty:</strong>
                {{ session.difficulty }}
            </span>

        </div>

        <!-- Progress -->
        <div class="progress">

            Question {{ question_number }} of {{ total_questions }}

        </div>

        <!-- AI Question -->
        <div class="question">

            <h2>{{ question }}</h2>

        </div>

        <!-- User Answer -->
        <div class="answer">

            <textarea
                name="answer"
                rows="8"
                placeholder="Type your answer here..."
                required
                autofocus
            ></textarea>

        </div>

        <!-- Submit -->
        <button class="next-btn" type="submit">

            {% if question_number == total_questions %}
                Finish Interview ✅
            {% else %}
                Next Question →
            {% endif %}

        </button>

    </form>

</div>

</body>

</html>
