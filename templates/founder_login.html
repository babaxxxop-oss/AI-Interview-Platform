<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Founder Access</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 flex items-center justify-center min-h-screen">

    <div class="bg-slate-900 p-8 rounded-2xl w-96 shadow-2xl">

        <h1 class="text-2xl font-bold text-white text-center mb-6">
            🔒 Founder Access
        </h1>

        <form action="/founder/check" method="POST">

            <input
                type="password"
                name="code"
                placeholder="Enter Secret Code"
                class="w-full p-3 rounded-lg bg-slate-800 text-white border border-slate-700 outline-none mb-4">

            <button
                class="w-full bg-violet-600 hover:bg-violet-700 text-white py-3 rounded-lg">
                Unlock
            </button>

        </form>

    </div>

</body>

</html>
