<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Mock | Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/login.css') }}">

</head>

<body>

    <div class="login-container">

        <!-- Logo -->
        <div class="logo">

            <img src="{{ url_for('static', filename='images/logo.png') }}"
                 alt="AI Mock Logo">

        </div>

        <!-- Welcome Text -->

        <h1>Welcome Back</h1>

        <h2>Sign in to continue your AI interview journey.</h2>

        <!-- Login Form -->

        <form action="/login" method="POST">

            <!-- Username -->

            <label for="username">

                Username

            </label>

            <input

                type="text"

                id="username"

                name="username"

                placeholder="Enter your username"

                autocomplete="username"

                required>

            <!-- Password -->

            <label for="password">

                Password

            </label>

            <div class="password-box">

                <input

                    type="password"

                    id="password"

                    name="password"

                    placeholder="Enter your password"

                    autocomplete="current-password"

                    required>

                <span id="togglePassword">

                    👁️

                </span>

            </div>

            <!-- Remember Me -->

            <div class="options">

                <label>

                    <input

                        type="checkbox"

                        name="remember">

                    Remember Me

                </label>

                <a href="#">

                    Forgot Password?

                </a>

            </div>

            <!-- Login Button -->

            <button type="submit">

                Login

            </button>

        </form>

        <!-- Register -->

        <p>

            Don't have an account?

            <a href="/register">

                Register

            </a>

        </p>

    </div>

    <!-- JavaScript -->

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>

</body>

</html>
